name: AppImage
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: "AppImage"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3 \
            python3-pip \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            desktop-file-utils \
            appstream \
            wget \
            file \
            cmake \
            libvtk9-dev \
            libopengl-dev \
            fuse \
            elfutils \
            patchelf \
            gettext \
            itstool \
            librsvg2-bin

      - name: Install F3D from source
        run: |
          git clone --depth=1 --branch v2.5.0 https://github.com/f3d-app/f3d.git /tmp/f3d
          cmake -S /tmp/f3d -B /tmp/f3d-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/f3d-build --parallel $(nproc)
          sudo cmake --install /tmp/f3d-build

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build project
        run: |
          meson setup builddir --prefix=/usr
          DESTDIR=AppDir ninja -C builddir install
          mv builddir/AppDir .
          # Copy Python interpreter and libraries into AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/lib/x86_64-linux-gnu
          cp -a /usr/bin/python3 AppDir/usr/bin/
          cp -a /usr/lib/python3.* AppDir/usr/lib/
          cp -a /usr/lib/x86_64-linux-gnu/libpython3.*so* AppDir/usr/lib/x86_64-linux-gnu/ 2>/dev/null || true
          # Create AppRun wrapper
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          export PYTHONPATH="${APPDIR}/usr/share/exhibit:${APPDIR}/usr/lib/python3.12/site-packages:${PYTHONPATH}"
          export LD_LIBRARY_PATH="${APPDIR}/usr/lib:${APPDIR}/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH}"
          export PATH="${APPDIR}/usr/bin:${PATH}"
          export GI_TYPELIB_PATH="${APPDIR}/usr/lib/girepository-1.0:${GI_TYPELIB_PATH}"
          exec "${APPDIR}/usr/bin/python3" "${APPDIR}/usr/bin/exhibit" "$@"
          EOF
          chmod +x AppDir/AppRun
          # Copy desktop file and icon
          cp AppDir/usr/share/applications/io.github.nokse22.Exhibit.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/scalable/apps/io.github.nokse22.Exhibit.svg AppDir/.DirIcon
          # Convert SVG to PNG for desktop file
          convert AppDir/.DirIcon -resize 256x256 AppDir/io.github.nokse22.Exhibit.png 2>/dev/null || \
            rsvg-convert -w 256 -h 256 -o AppDir/io.github.nokse22.Exhibit.png AppDir/.DirIcon 2>/dev/null || \
            cp AppDir/.DirIcon AppDir/io.github.nokse22.Exhibit.png

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage --appimage-extract
          ./squashfs-root/AppRun AppDir Exhibit-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exhibit-x86_64.AppImage
          path: Exhibit-*.AppImage

      - name: Fetch release notes from upstream
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -s https://api.github.com/repos/Nokse22/Exhibit/releases/tags/${TAG} | jq -r '.body' > release_notes.md

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Exhibit-*.AppImage
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
