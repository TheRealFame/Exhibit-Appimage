name: AppImage
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  appimage:
    name: "AppImage"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3 \
            python3-pip \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            desktop-file-utils \
            appstream \
            wget \
            file \
            cmake \
            libvtk9-dev \
            libopengl-dev \
            fuse \
            elfutils \
            patchelf \
            gettext

      - name: Install F3D from source
        run: |
          git clone --depth=1 --branch v2.5.0 https://github.com/f3d-app/f3d.git /tmp/f3d
          cmake -S /tmp/f3d -B /tmp/f3d-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/f3d-build --parallel $(nproc)
          sudo cmake --install /tmp/f3d-build

      - name: Install appimage-builder
        run: |
          pip install appimage-builder --break-system-packages

      - name: Build project
        run: |
          meson setup builddir --prefix=/usr
          ninja -C builddir install DESTDIR=AppDir

      - name: Build AppImage
        run: |
          appimage-builder --recipe build-aux/AppImageBuilder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exhibit-x86_64.AppImage
          path: Exhibit-*.AppImage

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Exhibit-*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
