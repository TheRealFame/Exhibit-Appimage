name: AppImage
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: "AppImage"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3 \
            python3-pip \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            desktop-file-utils \
            appstream \
            wget \
            file \
            cmake \
            libvtk9-dev \
            libopengl-dev \
            fuse \
            elfutils \
            patchelf \
            gettext \
            itstool \
            librsvg2-bin

      - name: Install F3D from source
        run: |
          git clone --depth=1 --branch v2.5.0 https://github.com/f3d-app/f3d.git /tmp/f3d
          cmake -S /tmp/f3d -B /tmp/f3d-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/f3d-build --parallel $(nproc)
          sudo cmake --install /tmp/f3d-build

      - name: Install linuxdeploy and plugins
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk-x86_64.AppImage

      - name: Build project
        run: |
          meson setup builddir --prefix=/usr
          DESTDIR=AppDir ninja -C builddir install
          mv builddir/AppDir .

      - name: Build AppImage with linuxdeploy
        run: |
          export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
          export QMAKE=/usr/bin/qmake6
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin gtk \
            --executable AppDir/usr/bin/exhibit \
            --desktop-file AppDir/usr/share/applications/io.github.nokse22.Exhibit.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/io.github.nokse22.Exhibit.svg \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exhibit-x86_64.AppImage
          path: Exhibit-*.AppImage

      - name: Fetch release notes from upstream
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          curl -s https://api.github.com/repos/Nokse22/Exhibit/releases/tags/${TAG} | jq -r '.body' > release_notes.md

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Exhibit-*.AppImage
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
