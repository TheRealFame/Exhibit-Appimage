name: AppImage

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  appimage:
    name: "AppImage"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3 \
            python3-pip \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libf3d-dev \
            libf3d-gl-dev \
            desktop-file-utils \
            appstream \
            wget \
            file

      - name: Install appimage-builder
        run: |
          wget https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.0.0/appimage-builder-1.0.0-x86_64.AppImage
          chmod +x appimage-builder-1.0.0-x86_64.AppImage
          sudo mv appimage-builder-1.0.0-x86_64.AppImage /usr/local/bin/appimage-builder

      - name: Build project
        run: |
          meson setup builddir --prefix=/usr
          ninja -C builddir install DESTDIR=AppDir

      - name: Build AppImage
        run: |
          appimage-builder --recipe build-aux/AppImageBuilder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exhibit-x86_64.AppImage
          path: Exhibit-*.AppImage

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Exhibit-*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
